<!doctype html>
<html lang="en">
<head>

  <link rel="stylesheet" href="/assets/css/common.css" />
</head>
<body>
  <div class="container">

          <a class="btn" href="/patient/progress.html">Progress</a>

      </div>

  <script type="module">
    import { getUserRole } from '/assets/js/api.js';
    const role = getUserRole();
    if(role && role !== 'patient') location.href = '/'+role+'/dashboard.html';
