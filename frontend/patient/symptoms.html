<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Submit Symptoms</title>
  <link rel="stylesheet" href="/assets/css/common.css" />
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Submit Symptoms</h1>
      <p class="muted">Calls <code>POST /api/symptoms/report</code></p>

      <div id="notice" class="notice" style="display:none"></div>

      <label for="patient_id">Patient ID</label>
      <input id="patient_id" type="number" placeholder="e.g., 1" />

      <label for="cough_duration">Cough duration (days, optional)</label>
      <input id="cough_duration" type="number" />

      <div class="row">
        <div style="flex:1;min-width:220px;">
          <label><input type="checkbox" id="blood_in_sputum" /> Blood in sputum</label>
        </div>
        <div style="flex:1;min-width:220px;">
          <label><input type="checkbox" id="chest_pain" /> Chest pain</label>
        </div>
      </div>

      <div class="row">
        <div style="flex:1;min-width:220px;">
          <label><input type="checkbox" id="fever" /> Fever</label>
        </div>
        <div style="flex:1;min-width:220px;">
          <label><input type="checkbox" id="night_sweats" /> Night sweats</label>
        </div>
      </div>

      <div class="row">
        <div style="flex:1;min-width:220px;">
          <label><input type="checkbox" id="fatigue" /> Fatigue</label>
        </div>
        <div style="flex:1;min-width:220px;">
          <label for="weight_loss">Weight loss % (optional)</label>
          <input id="weight_loss" type="number" step="0.1" />
        </div>
      </div>

      <div class="row">
        <div style="flex:1;min-width:220px;">
          <label><input type="checkbox" id="breathing_difficulty" /> Breathing difficulty</label>
        </div>
        <div style="flex:1;min-width:220px;">
          <label for="oxygen_saturation">Oxygen saturation (%)</label>
          <input id="oxygen_saturation" type="number" step="0.1" value="98" />
        </div>
      </div>

      <div style="display:flex;gap:10px;margin-top:16px;flex-wrap:wrap;">
        <button class="btn btn-primary" id="btnSubmit" type="button">Submit report</button>
        <a class="btn" href="/patient/dashboard.html">Back</a>
      </div>
    </div>
  </div>

  <script type="module">
    import { apiFetch, getUserRole } from '/assets/js/api.js';

    if(getUserRole() !== 'patient' && getUserRole() !== 'nurse'){
      location.href = '/login.html';
    }

    const notice = document.getElementById('notice');
    const show = (msg, kind='error') => {
      notice.style.display='block';
      notice.className = `notice ${kind}`;
      notice.textContent = msg;
    };

    document.getElementById('btnSubmit').addEventListener('click', async ()=>{
      const patient_id = Number(document.getElementById('patient_id').value);
      if(!patient_id){ show('Enter patient_id'); return; }

      const payload = {
        patient_id,
        cough_duration: document.getElementById('cough_duration').value ? Number(document.getElementById('cough_duration').value) : null,
        blood_in_sputum: document.getElementById('blood_in_sputum').checked,
        chest_pain: document.getElementById('chest_pain').checked || null,
        fever: document.getElementById('fever').checked || null,
        night_sweats: document.getElementById('night_sweats').checked || null,
        fatigue: document.getElementById('fatigue').checked || null,
        weight_loss: document.getElementById('weight_loss').value ? Number(document.getElementById('weight_loss').value) : null,
        breathing_difficulty: document.getElementById('breathing_difficulty').checked || null,
        oxygen_saturation: Number(document.getElementById('oxygen_saturation').value),
      };

      try{
        notice.style.display='none';
        const res = await apiFetch('/symptoms/report', { method:'POST', body:payload });

        show(`Submitted. Response: ${JSON.stringify(res)}`,'success');
      }catch(e){
        show(e.message||'Submit failed');
      }
    });
  </script>
</body>
</html>
