<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Medication - TBMonitor</title>
  <link rel="stylesheet" href="/assets/css/common.css" />
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar">
    <div class="navbar-inner">
      <a href="/patient/dashboard.html" class="navbar-brand">
        <img src="/assets/images/logo-icon.svg" alt="TB Monitor" width="32" height="32" />
        TB<span>Monitor</span>
      </a>
      <button class="navbar-toggle" id="navToggle" type="button" aria-label="Toggle navigation"><span></span><span></span><span></span></button>
      <div class="navbar-links">
        <a href="/patient/dashboard.html">Dashboard</a>
        <a href="/patient/symptoms.html">Symptoms</a>
        <a href="/patient/medication.html" class="active">Medication</a>
        <a href="/patient/progress.html">Progress</a>
        <a href="/patient/notifications.html">Alerts</a>
        <a href="#" id="mobileLogout" class="mobile-logout">Logout</a>
      </div>
      <button class="navbar-logout" id="logoutBtn" type="button">Logout</button>
    </div>
  </nav>

  <div class="section-content" style="padding-top:96px;padding-bottom:32px;">
    <div class="page-header">
      <h1>Medication & Adherence</h1>
      <a class="btn" href="/patient/dashboard.html">Back to Dashboard</a>
    </div>

    <div class="card">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;">
        <div class="feature-card-icon">
          <img src="/assets/images/icon-medication.svg" alt="Medication" width="32" height="32" />
        </div>
        <div>
          <h2 style="margin:0">Log Your Daily Dose</h2>
          <p class="muted" style="margin:4px 0 0">Record whether you took your medication today and add any remarks.</p>
        </div>
      </div>

      <div id="notice" class="notice" style="display:none"></div>

      <label for="patient_id">Patient ID <span class="muted">(auto-filled)</span></label>
      <input id="patient_id" type="number" readonly />

      <div class="grid-2">
        <div>
          <label class="cb-label" style="margin-top:18px;">
            <input type="checkbox" id="taken" checked /> Took medication today
          </label>
        </div>
        <div>
          <label for="taken_time">Taken time</label>
          <input id="taken_time" placeholder="2026-06-21T10:30:00Z" />
        </div>
      </div>

      <label for="remarks">Remarks <span class="muted">(optional)</span></label>
      <textarea id="remarks" rows="3" placeholder="e.g., felt dizzy after taking medication"></textarea>

      <div style="display:flex;gap:10px;margin-top:24px;flex-wrap:wrap;">
        <button class="btn btn-primary" id="btnUpdate" type="button">Update Adherence</button>
        <a class="btn" href="/patient/dashboard.html">Cancel</a>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-inner">
      &copy; 2026 TB Monitoring System. All rights reserved.
    </div>
  </footer>

  <script type="module">
    import { apiFetch, getUserRole, clearToken } from '/assets/js/api.js';

    document.getElementById('navToggle')?.addEventListener('click', () => {
      document.querySelector('.navbar-links')?.classList.toggle('open');
    });

    if(getUserRole() !== 'patient'){
      location.href = '/login.html';
    }

    const doLogout = () => { clearToken(); location.href = '/login.html'; };
    document.getElementById('logoutBtn').addEventListener('click', doLogout);
    document.getElementById('mobileLogout')?.addEventListener('click', (e) => { e.preventDefault(); doLogout(); });

    const notice = document.getElementById('notice');
    const show = (msg, kind='error') => {
      notice.style.display='block';
      notice.className = `notice ${kind}`;
      notice.textContent = msg;
    };

    (async () => {
      notice.style.display = 'block';
      notice.className = 'notice';
      notice.innerHTML = '<div class="spinner"></div> Loading your patient record...';
      try {
        const myPatient = await apiFetch('/patients/my-patient');
        document.getElementById('patient_id').value = myPatient.patient.id;
        notice.style.display = 'none';
      } catch(e) {
        notice.style.display='block';
        notice.className = 'notice error';
        notice.textContent = 'Could not auto-detect your patient record: ' + e.message;
      }
    })();

    document.getElementById('btnUpdate').addEventListener('click', async ()=>{
      const patient_id = Number(document.getElementById('patient_id').value);
      if(!patient_id){ show('Enter patient_id'); return; }

      const taken = document.getElementById('taken').checked;
      const taken_time_raw = document.getElementById('taken_time').value.trim();
      const taken_time = taken_time_raw || new Date().toISOString();

      const payload = {
        patient_id,
        taken,
        taken_time,
        remarks: document.getElementById('remarks').value.trim() || null,
      };

      try{
        notice.style.display='none';
        const res = await apiFetch('/adherence/update', { method:'POST', body:payload });
        show('Adherence updated successfully!','success');
      }catch(e){
        show(e.message||'Update failed');
      }
    });
  </script>
</body>
</html>
