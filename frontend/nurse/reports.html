<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reports</title>
  <link rel="stylesheet" href="/assets/css/common.css" />
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Reports</h1>
      <p class="muted">Calls <code>GET /api/reports/patient/{patient_id}</code> (stubbed backend)</p>

      <div class="row">
        <div style="flex:1;min-width:220px;">
          <label for="patient_id">Patient ID</label>
          <input id="patient_id" type="number" placeholder="e.g., 1" />
        </div>
      </div>

      <div style="display:flex;gap:10px;margin-top:14px;flex-wrap:wrap;">
        <button class="btn btn-primary" id="btnLoad" type="button">Load report</button>
        <a class="btn" href="/nurse/dashboard.html">Back</a>
      </div>

      <div id="notice" class="notice" style="display:none;margin-top:12px;"></div>
      <pre id="out" class="card" style="margin-top:12px;white-space:pre-wrap;"></pre>
    </div>
  </div>

  <script type="module">
    import { apiFetch, getUserRole } from '/assets/js/api.js';

    if(getUserRole() !== 'nurse' && getUserRole() !== 'provider'){
      location.href = '/login.html';
    }

    const notice = document.getElementById('notice');
    const out = document.getElementById('out');

    const show = (msg, kind='error') => {
      notice.style.display='block';
      notice.className = `notice ${kind}`;
      notice.textContent = msg;
    };

    document.getElementById('btnLoad').addEventListener('click', async ()=>{
      const patient_id = Number(document.getElementById('patient_id').value);
      if(!patient_id){ show('Enter patient_id'); return; }

      try{
        notice.style.display='none';
        const data = await apiFetch(`/reports/patient/${patient_id}`);
        out.textContent = JSON.stringify(data, null, 2);
      }catch(e){
        show(e.message||'Failed to load report');
      }
    });
  </script>
</body>
</html>
