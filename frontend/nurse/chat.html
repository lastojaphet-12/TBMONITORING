<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chat - TBMonitor</title>
  <link rel="stylesheet" href="/assets/css/common.css" />
  <style>
    .chat-log{height:320px;overflow-y:auto;padding:16px;margin-bottom:16px}
    .chat-msg{padding:8px 14px;margin-bottom:8px;border-radius:8px;background:var(--bg-offwhite);border:1px solid var(--border);font-size:0.9rem}
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="navbar-inner">
      <a href="/nurse/dashboard.html" class="navbar-brand">
        <img src="/assets/images/logo-icon.svg" alt="TB Monitor" width="32" height="32" />
        TB<span>Monitor</span>
      </a>
      <button class="navbar-toggle" id="navToggle" type="button" aria-label="Toggle navigation"><span></span><span></span><span></span></button>
      <div class="navbar-links">
        <a href="/nurse/dashboard.html">Dashboard</a>
        <a href="/nurse/monitoring.html">Monitoring</a>
        <a href="/nurse/alerts.html">Alerts<span class="alert-badge" id="alertBadge" style="display:none">0</span></a>
        <a href="/nurse/reports.html">Reports</a>
        <a href="/nurse/chat.html" class="active">Chat</a>
      </div>
      <button class="navbar-logout" id="logoutBtn" type="button">Logout</button>
    </div>
  </nav>

  <div class="section-content" style="padding-top:96px;padding-bottom:32px;">
    <div class="page-header">
      <h1>Messaging</h1>
      <a class="btn" href="/nurse/dashboard.html">Back to Dashboard</a>
    </div>

    <div class="card">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;">
        <div class="feature-card-icon">
          <img src="/assets/images/icon-symptoms.svg" alt="Chat" width="32" height="32" />
        </div>
        <div>
          <h2 style="margin:0">Secure Messaging</h2>
          <p class="muted" style="margin:4px 0 0">Send and receive messages via WebSocket.</p>
        </div>
      </div>

      <div id="log" class="card chat-log"></div>

      <div class="row" style="align-items:end;">
        <div style="flex:1;min-width:240px;">
          <label for="msg">Message</label>
          <input id="msg" placeholder="Type your message..." />
        </div>
        <div>
          <button class="btn btn-primary" id="btnSend" type="button">Send</button>
        </div>
      </div>
    </div>
  </div>

  <footer class="footer">
    <div class="footer-inner">
      &copy; 2026 TB Monitoring System. All rights reserved.
    </div>
  </footer>

  <script type="module">
    import { getUserRole, clearToken, apiFetch, wsConnect } from '/assets/js/api.js';

    document.getElementById('navToggle')?.addEventListener('click', () => {
      document.querySelector('.navbar-links')?.classList.toggle('open');
    });

    if(getUserRole() !== 'nurse' && getUserRole() !== 'provider' && getUserRole() !== 'patient'){
      location.href = '/login.html';
    }

    const doLogout = () => { clearToken(); location.href = '/login.html'; };
    document.getElementById('logoutBtn')?.addEventListener('click', doLogout);
    (async function updateAlertBadge() {
      try {
        const data = await apiFetch('/alerts');
        const badge = document.getElementById('alertBadge');
        const count = (data.alerts || []).length;
        if (badge && count > 0) { badge.textContent = count; badge.style.display = 'inline-block'; }
      } catch(e) { /* ignore */ }
    })();

    const log = document.getElementById('log');
    const msg = document.getElementById('msg');
    const btnSend = document.getElementById('btnSend');

    const ws = await wsConnect((data) => {
      const div = document.createElement('div');
      div.className = 'chat-msg';
      div.textContent = typeof data === 'string' ? data : JSON.stringify(data);
      log.appendChild(div);
      log.scrollTop = log.scrollHeight;
    });

    btnSend.addEventListener('click', () => {
      if(ws.readyState !== WebSocket.OPEN) return;
      ws.send(msg.value);
      msg.value = '';
    });

    msg.addEventListener('keydown', (e) => {
      if(e.key === 'Enter') btnSend.click();
    });
  </script>

</body>
</html>
